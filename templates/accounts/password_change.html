{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Change Password{% endblock %}
{% block breadcrumb %}
<a href="{% url 'dashboard:index' %}" class="text-muted text-decoration-none">Dashboard</a>
<span class="text-muted mx-2">/</span>
<a href="{% url 'accounts:profile' %}" class="text-muted text-decoration-none">Profile</a>
<span class="text-muted mx-2">/</span>
<span class="text-light">Change Password</span>
{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card bg-dark border-secondary shadow-sm">
                <div class="card-header border-secondary text-center py-4">
                    <div class="bg-warning bg-opacity-25 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock fs-2 text-warning"></i>
                    </div>
                    <h5 class="card-title text-white mb-0">Change Your Password</h5>
                </div>
                <div class="card-body px-4 py-4">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4 pt-2">
                            <button type="submit" class="btn btn-warning">Update Password</button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
