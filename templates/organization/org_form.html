{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Setup Organization{% endblock %}
{% block breadcrumb %}
<a href="{% url 'dashboard:index' %}" class="text-muted text-decoration-none">Dashboard</a>
<span class="text-muted mx-2">/</span>
<a href="{% url 'organization:org_detail' %}" class="text-muted text-decoration-none">Organization</a>
<span class="text-muted mx-2">/</span>
<span class="text-light">Setup</span>
{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark border-secondary shadow-sm">
                <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                    <h5 class="card-title text-white mb-0">Organization setup</h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'organization:org_detail' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
